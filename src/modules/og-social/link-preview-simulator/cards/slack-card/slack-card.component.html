<ng-container *transloco="let t">
  <div class="border border-slate-200 rounded bg-white overflow-hidden">
    <div class="flex">
      <div class="w-[3px] bg-slate-300 shrink-0"></div>
      <div class="flex flex-col px-3 py-2.5 gap-1.5 flex-1 min-w-0">
        <div class="flex items-center gap-1.5">
          <span
            class="w-4 h-4 rounded-full bg-slate-200 shrink-0 flex items-center justify-center text-[8px] text-slate-400"
            >●</span
          >
          <p class="text-[12px] text-slate-500 leading-none truncate">
            {{ data().siteName || data().domain.toLowerCase() }}
          </p>
        </div>
        <p class="text-[14px] font-semibold text-[#1264A3] leading-tight">
          {{ truncate(data().title, 80) || t('social.simulator.no_title') }}
        </p>
        <p class="text-[13px] text-slate-700 leading-snug">
          {{ truncate(data().description, 120) }}
        </p>
        @if (data().image && !imgError()) {
          <div class="mt-1 border border-slate-200 rounded overflow-hidden">
            <img
              class="w-full object-cover max-h-[180px]"
              [src]="data().image!"
              (error)="onImgError()"
              alt=""
            />
          </div>
        } @else if (data().image) {
          <div
            class="mt-1 border border-slate-200 rounded h-[80px] bg-slate-50 flex items-center justify-center text-xs text-slate-300"
          >
            {{ t('social.simulator.image_not_accessible') }}
          </div>
        }
      </div>
    </div>
  </div>
</ng-container>
