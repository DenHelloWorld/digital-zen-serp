<ng-container *transloco="let t">
  <!-- Top bar -->
  <div
    class="flex items-center justify-between px-2 py-1 border-b border-slate-200 w-full bg-white shrink-0"
  >
    <a href="https://www.linkedin.com/company/csmpoint" target="_blank" rel="noopener noreferrer">
      <img class="w-6 h-6 rounded" src="logo.jpg" alt="logo" />
    </a>

    <div class="flex items-center gap-2">
      <!-- Lang switcher -->
      <div class="flex gap-0.5">
        @for (lang of languages; track lang.code) {
          <button
            class="px-1.5 py-0.5 rounded text-xs font-medium transition-colors cursor-pointer border"
            [class.border-cyan-300]="activeLang() === lang.code"
            [class.bg-cyan-50]="activeLang() === lang.code"
            [class.text-cyan-700]="activeLang() === lang.code"
            [class.border-transparent]="activeLang() !== lang.code"
            [class.text-slate-500]="activeLang() !== lang.code"
            [class.hover:bg-slate-50]="activeLang() !== lang.code"
            [attr.aria-label]="lang.label"
            (click)="setLang(lang.code)"
            type="button"
          >
            {{ lang.flag }}
          </button>
        }
      </div>

      <!-- Close -->
      <button
        class="flex items-center justify-center w-6 h-6 rounded text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors cursor-pointer"
        (click)="closePanel()"
        aria-label="Close panel"
        type="button"
      >
        ✕
      </button>
    </div>
  </div>

  <!-- Navigation tabs -->
  <header class="sticky top-0 z-30 w-full bg-white border-b border-slate-200 shrink-0">
    <nav class="flex w-full">
      @for (tab of tabs; track tab.route) {
        <a
          class="flex-1 py-2 text-center text-xs font-medium transition-colors cursor-pointer no-underline border-b-2 truncate px-1"
          [class.border-cyan-600]="currentUrl() === '/' + tab.route"
          [class.text-cyan-700]="currentUrl() === '/' + tab.route"
          [class.bg-white]="currentUrl() === '/' + tab.route"
          [class.border-transparent]="currentUrl() !== '/' + tab.route"
          [class.text-slate-500]="currentUrl() !== '/' + tab.route"
          [class.hover:text-slate-700]="currentUrl() !== '/' + tab.route"
          [class.hover:bg-slate-50]="currentUrl() !== '/' + tab.route"
          [routerLink]="tab.route"
          [dzTitleIfTruncated]="tab.emoji + ' ' + t(tab.labelKey)"
        >
          {{ tab.emoji }} {{ t(tab.labelKey) }}
        </a>
      }
    </nav>
  </header>
</ng-container>

<router-outlet />
