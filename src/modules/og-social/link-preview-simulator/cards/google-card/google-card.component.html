<div class="flex flex-col gap-1 py-2 px-1">
  <div class="flex items-center gap-2">
    @if (!faviconError()) {
      <img
        class="w-5 h-5 rounded-full shrink-0"
        [src]="faviconSrc()"
        (error)="onFaviconError()"
        alt=""
      />
    } @else {
      <div class="w-5 h-5 rounded-full bg-slate-200 shrink-0"></div>
    }
    <span class="text-sm text-slate-700 leading-none">{{ data().domain.toLowerCase() }}</span>
  </div>
  <a class="text-[18px] text-[#1a0dab] font-normal leading-snug cursor-default select-none">
    {{ truncate(data().title, 60) || '—' }}
  </a>
  <p class="text-sm text-[#4d5156] leading-snug">{{ truncate(data().description, 160) }}</p>
</div>
